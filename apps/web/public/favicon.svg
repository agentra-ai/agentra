<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Agentra">
  <defs>
    <linearGradient id="agentra-favicon-bg" x1="12" y1="12" x2="88" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a1220"/>
      <stop offset="0.55" stop-color="#15263d"/>
      <stop offset="1" stop-color="#1b314f"/>
    </linearGradient>
    <linearGradient id="agentra-favicon-mark" x1="30" y1="18" x2="70" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f5f7ff"/>
      <stop offset="1" stop-color="#b9d5ff"/>
    </linearGradient>
    <polygon id="agentra-favicon-blade" points="50,11 66.5,37 56.5,57 50,51.5 43.5,57 33.5,37"/>
  </defs>
  <rect width="100" height="100" rx="24" fill="url(#agentra-favicon-bg)"/>
  <circle cx="50" cy="50" r="36" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <use href="#agentra-favicon-blade" fill="url(#agentra-favicon-mark)"/>
  <use href="#agentra-favicon-blade" fill="url(#agentra-favicon-mark)" transform="rotate(120 50 50)"/>
  <use href="#agentra-favicon-blade" fill="url(#agentra-favicon-mark)" transform="rotate(240 50 50)"/>
  <circle cx="50" cy="50" r="6.5" fill="url(#agentra-favicon-mark)"/>
</svg>
