name: agentra

services:
  postgres:
    container_name: agentra-postgres
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentra}
      POSTGRES_USER: ${POSTGRES_USER:-agentra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentra}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentra} -d ${POSTGRES_DB:-agentra}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  migrate:
    container_name: agentra-migrate
    build:
      context: .
      target: server-runtime
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-agentra}:${POSTGRES_PASSWORD:-agentra}@postgres:5432/${POSTGRES_DB:-agentra}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["./migrate"]
    command: ["up"]
    restart: "no"

  server:
    container_name: agentra-server
    build:
      context: .
      target: server-runtime
    env_file:
      - .env
    environment:
      PORT: ${SERVER_INTERNAL_PORT}
      DATABASE_URL: postgres://${POSTGRES_USER:-agentra}:${POSTGRES_PASSWORD:-agentra}@postgres:5432/${POSTGRES_DB:-agentra}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${PORT}:${SERVER_INTERNAL_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - ${SERVER_HEALTHCHECK_URL} >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    container_name: agentra-web
    build:
      context: .
      target: web-runtime
      args:
        REMOTE_API_URL: ${REMOTE_API_URL:-http://server:8080}
    environment:
      HOSTNAME: ${WEB_HOSTNAME}
      PORT: ${WEB_INTERNAL_PORT}
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT}:${WEB_INTERNAL_PORT}"
    restart: unless-stopped

  minio:
    container_name: agentra-minio
    image: docker.1ms.run/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - miniodata:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
